<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Model Score Calculation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn1.adoberesources.net/alloy/2.22.0/alloy.min.js" async></script>
<script>
   !function(n,o){o.forEach(function(o){n[o]||((n.__alloyNS=n.__alloyNS||
   []).push(o),n[o]=function(){var u=arguments;return new Promise(
   function(i,l){n[o].q.push([i,l,u])})},n[o].q=[])})}
   (window,["alloy"]);

   alloy("configure", {
     datastreamId: "2f8c3176-75c0-49a5-9ce0-f725a390a261",
     orgId: "0CEB60F754C7E06B0A4C98A2@AdobeOrg",

<style>
   body { font-family: Arial, sans-serif; padding: 50px; line-height: 1.6; }
   #subscriptionForm { border: 1px solid #ccc; padding: 20px; border-radius: 8px; max-width: 400px; }
   button { margin-top: 20px; padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
</style>
</head>

<body>
<h1>AEP Test Use Case</h1>
<p>Enter your UUID and choose a preference to simulate a profile event.</p>

<input type="text" id="userInput" placeholder="Enter UUID (e.g. 33333333)" style="padding: 10px; width: 80%; margin-bottom: 20px;"><br>

<form id="subscriptionForm">
<p><strong>Choose your preferred Offer:</strong></p>
<div>
<input type="radio" id="stocks" name="assetclass" value="Offer1-Deals">
<label for="stocks">Offer1-Deals</label>
</div>
<div>
<input type="radio" id="bonds" name="assetclass" value="Offer2-Deals">
<label for="bonds">Offer2-Deals</label>
</div>
<div>
<input type="radio" id="cd" name="assetclass" value="Offer3-Deals">
<label for="cd">Offer3-Deals</label>
</div>
<button type="button" onclick="handleSubmission()">Submit Preference</button>
</form>

<div id="message" style="margin-top:20px; color:green; font-weight:bold;"></div>

<script>
   function handleSubmission() {
     var uuid = document.getElementById("userInput").value;
     var selectedOffer = document.querySelector('input[name="assetclass"]:checked');

     if (!uuid || !selectedOffer) {
       alert("Please enter a UUID and select an offer!");
       return;
     }

     // Sending the data to AEP
     alloy("sendEvent", {
       "xdm": {
         "_accenture_partner": {
           "UUID": uuid,
           "preference": selectedOffer.value // Sending the choice too!
         }
       }
     }).then(function(result) {
       document.getElementById("message").innerText = "Success! Data sent for UUID: " + uuid;
       console.log("AEP Response:", result);
     }).catch(function(error) {
       console.error("Error:", error);
     });
   }
</script>
</body>
</html>
