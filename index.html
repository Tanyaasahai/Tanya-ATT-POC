<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Model Score Calculation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn1.adoberesources.net/alloy/2.22.0/alloy.min.js"></script>
<script>
   !function(n,o){o.forEach(function(o){n[o]||((n.__alloyNS=n.__alloyNS||
   []).push(o),n[o]=function(){var u=arguments;return new Promise(
   function(i,l){n[o].q.push([i,l,u])})},n[o].q=[])})}
   (window,["alloy"]);
   // Function to run configuration
   function configureAlloy() {
     return alloy("configure", {
       datastreamId: "2f8c3176-75c0-49a5-9ce0-f725a390a261",
       orgId: "0CEB60F754C7E06B0A4C98A2@AdobeOrg",
       edgeDomain: "data.adobedc.net",
       debugEnabled: true,
       sandbox: "end2endflowpoc"
     });
   }
   // Run it on load
   configureAlloy();
</script>
<style>
   body { font-family: sans-serif; padding: 40px; background: #f4f4f9; }
   .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; }
   input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
   button { background: #007bff; color: white; font-weight: bold; cursor: pointer; border: none; }
</style>
</head>
<body>
<div class="container">
<h2>AEP Test Use Case</h2>
<input type="text" id="userInput" placeholder="Enter UUID (33333333)">
<p><strong>Choose your preferred Offer:</strong></p>
<label><input type="radio" name="assetclass" value="Offer1"> Offer1-Deals</label><br>
<label><input type="radio" name="assetclass" value="Offer2"> Offer2-Deals</label><br>
<label><input type="radio" name="assetclass" value="Offer3"> Offer3-Deals</label><br>
<button type="button" id="submitBtn">Submit Preference</button>
<div id="status"></div>
</div>
<script>
   document.getElementById("submitBtn").addEventListener("click", function() {
     var uuid = document.getElementById("userInput").value;
     var selected = document.querySelector('input[name="assetclass"]:checked');
     var statusDiv = document.getElementById("status");
     if (!uuid || !selected) {
       alert("Please fill in both fields.");
       return;
     }
     statusDiv.innerText = "Sending...";
     // Attempt to send
     alloy("sendEvent", {
       "xdm": {
         "_accenture_partner": {
           "UUID": uuid,
           "preference": selected.value
         }
       }
     }).then(function(result) {
       statusDiv.style.color = "green";
       statusDiv.innerText = "Success! Event sent.";
       alert("Success! Data is in AEP.");
     }).catch(function(err) {
       console.error("First attempt failed, retrying config...", err);
       // If it fails, try re-configuring and sending one last time
       configureAlloy().then(function() {
            return alloy("sendEvent", { "xdm": { "_accenture_partner": { "UUID": uuid } } });
       }).then(function() {
            statusDiv.innerText = "Success on retry!";
       }).catch(function(e) {
            statusDiv.style.color = "red";
            statusDiv.innerText = "Final Error: " + e.message;
       });
     });
   });
</script>
</body>
</html>
